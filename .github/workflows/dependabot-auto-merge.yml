name: Dependabot auto-merge

on:
  workflow_run:
    workflows:
      - Lint
      - Test
      - Deploy
    types:
      - completed

jobs:
  gate:
    name: Check auto-merge gate
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_merge: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Check required checks
        id: check
        uses: ./.github/actions/check-required-checks
        with:
          required_checks: |
            Lint
            Run tests
            Deploy Worker

  automerge:
    needs:
      - gate
    if: >-
      needs.gate.outputs.should_merge == 'true'
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: write
      pull-requests: write

    steps:
      - name: Resolve workflow_run PR
        id: pr
        uses: ./.github/actions/resolve-workflow-run-pr

      - name: Enable auto-merge
        if: steps.pr.outputs.pull_number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.pr.outputs.pull_number }}
          merge-method: squash
