name: Deploy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Worker
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Resolve deploy command
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "command=versions upload --preview-alias pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "command=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Wrangler version
        id: wrangler
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').devDependencies.wrangler.replace(/^[^0-9]*/, '')")" >> "$GITHUB_OUTPUT"

      - name: Sync Worker secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_CLIENT_ID: ${{ secrets.APP_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.APP_GITHUB_CLIENT_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: |
          printf '%s' "$GITHUB_CLIENT_ID" | npx wrangler versions secret put GITHUB_CLIENT_ID
          printf '%s' "$GITHUB_CLIENT_SECRET" | npx wrangler versions secret put GITHUB_CLIENT_SECRET
          printf '%s' "$LINKEDIN_CLIENT_ID" | npx wrangler versions secret put LINKEDIN_CLIENT_ID
          printf '%s' "$LINKEDIN_CLIENT_SECRET" | npx wrangler versions secret put LINKEDIN_CLIENT_SECRET

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: ${{ steps.wrangler.outputs.version }}
          command: ${{ steps.resolve.outputs.command }}
