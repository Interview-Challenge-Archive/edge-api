name: Deploy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Worker
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve deploy command
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "command=versions upload --preview-alias pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "command=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: ${{ steps.resolve.outputs.command }}
          secrets: |
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET
            LINKEDIN_CLIENT_ID
            LINKEDIN_CLIENT_SECRET
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
