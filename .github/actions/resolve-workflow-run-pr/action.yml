name: Resolve workflow_run pull request
description: Resolve the associated pull request from the current workflow_run event and verify it is open and not draft.
outputs:
  pull_number:
    description: Pull request number when the associated pull request is open and not draft.
    value: ${{ steps.resolve.outputs.pull_number }}
runs:
  using: composite
  steps:
    - name: Resolve pull request
      id: resolve
      uses: actions/github-script@v8
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const pullNumber = Number(`${{ github.event.workflow_run.pull_requests[0].number }}`);
          const { data: pullRequest } = await github.rest.pulls.get({
            owner,
            repo,
            pull_number: pullNumber,
          });

          if (pullRequest.state !== "open") {
            core.info(`PR #${pullNumber} is already ${pullRequest.state}.`);
            return;
          }

          if (pullRequest.draft) {
            core.info(`PR #${pullNumber} is a draft.`);
            return;
          }

          core.setOutput("pull_number", String(pullNumber));
