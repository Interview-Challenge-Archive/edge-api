name = "interview-challenge-archive"
main = "src/index.js"
compatibility_date = "2024-01-01"

[observability]
[observability.logs]
enabled = false
invocation_logs = true

[vars]
# Set GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, LINKEDIN_CLIENT_ID, LINKEDIN_CLIENT_SECRET
# as secrets using: wrangler secret put <NAME>

[[rules]]
type = "Text"
globs = ["**/*.yml"]
fallthrough = true
